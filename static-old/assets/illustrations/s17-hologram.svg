<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="s17-t s17-d" preserveAspectRatio="xMidYMid meet">
  <title id="s17-t">Hologram Agentic AI — preview orb</title>
  <desc id="s17-d">Hologram agent orb in periwinkle #7678ec with #6161cb for depth, carrying a credential badge. This is the one illustration on 2060.io that may carry a soft glow — reduced to roughly 50% of the live hologram.zone hero glow. Callout arrow beside it reads "Visit hologram.zone". 16:9.</desc>

  <defs>
    <!-- The permitted soft glow — a radial gradient at reduced intensity -->
    <radialGradient id="orb-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7678ec" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#7678ec" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7678ec" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halo around orb (the exception — only on this illustration) -->
  <circle cx="600" cy="450" r="280" fill="url(#orb-glow)"/>

  <!-- Depth shadow -->
  <circle cx="608" cy="458" r="125" fill="#6161cb" opacity="0.55"/>

  <!-- Central orb -->
  <circle cx="600" cy="450" r="125" fill="#7678ec"/>

  <!-- Face hint (two light points, like eyes) -->
  <circle cx="565" cy="430" r="8" fill="#ffffff" opacity="0.85"/>
  <circle cx="635" cy="430" r="8" fill="#ffffff" opacity="0.85"/>

  <!-- Credential badge attached to the orb -->
  <g transform="translate(710 540)">
    <path d="M 0 -36 L 28 -22 L 28 16 L 0 36 L -28 16 L -28 -22 Z"
          fill="#6161cb" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M -11 0 L -2 9 L 14 -11"
          fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label for the orb (agent identity hint) -->
  <text x="600" y="640" text-anchor="middle" fill="currentColor"
        font-family="'Space Grotesk', Inter, sans-serif" font-size="16" font-weight="500"
        letter-spacing="2" style="text-transform:uppercase" opacity="0.7">Agent · Verified</text>

  <!-- ============ RIGHT CALLOUT ============ -->
  <!-- Arrow from orb region to the callout text -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="870" y1="450" x2="1070" y2="450"/>
    <path d="M 1060 440 L 1070 450 L 1060 460"/>
  </g>

  <!-- Callout text -->
  <g transform="translate(1090 450)" fill="currentColor">
    <text x="0" y="-12" opacity="0.6"
          font-family="'Space Grotesk', Inter, sans-serif" font-size="12" font-weight="500"
          letter-spacing="2" style="text-transform:uppercase">Flagship product</text>
    <text x="0" y="16"
          font-family="'Space Grotesk', Inter, sans-serif" font-size="30" font-weight="700">Hologram</text>
    <text x="0" y="46" opacity="0.7"
          font-family="Inter, sans-serif" font-size="15">hologram.zone  ↗</text>
  </g>

  <!-- Bottom note: the glow exception, labelled -->
  <text x="60" y="860" fill="currentColor" opacity="0.35"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">⎯ the one illustration on 2060.io that carries a glow — a bounded quote of Hologram's identity</text>
</svg>
