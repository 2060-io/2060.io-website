<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="s19-t s19-d" preserveAspectRatio="xMidYMid meet">
  <title id="s19-t">The Verana operational stack</title>
  <desc id="s19-d">Architecture diagram. VPR node at the centre; six orbiting tools (Frontend, Resolver, Indexer, Visualizer, Faucet, Explorer) connected by hairline arrows with #553C9A arrowheads indicating data flow. 16:9.</desc>

  <defs>
    <!-- Reusable accent arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#553C9A"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="80" text-anchor="middle" fill="currentColor" opacity="0.55"
        font-family="'Space Grotesk', Inter, sans-serif" font-size="14" font-weight="500"
        letter-spacing="2" style="text-transform:uppercase">The Verana operational stack</text>

  <!-- Connector lines from each satellite to the central VPR -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.25">
    <line x1="800" y1="230" x2="800" y2="380" marker-end="url(#arrow)"/>    <!-- Frontend -->
    <line x1="1150" y1="290" x2="870" y2="420" marker-end="url(#arrow)"/>   <!-- Resolver -->
    <line x1="1150" y1="650" x2="870" y2="520" marker-end="url(#arrow)"/>   <!-- Indexer -->
    <line x1="800" y1="710" x2="800" y2="560" marker-end="url(#arrow)"/>    <!-- Visualizer -->
    <line x1="450" y1="650" x2="730" y2="520" marker-end="url(#arrow)"/>    <!-- Faucet -->
    <line x1="450" y1="290" x2="730" y2="420" marker-end="url(#arrow)"/>    <!-- Explorer -->
  </g>

  <!-- ============ CENTRAL VPR NODE ============ -->
  <g transform="translate(800 470)">
    <circle cx="0" cy="0" r="75" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
    <text x="0" y="4" text-anchor="middle" fill="currentColor"
          font-family="'Space Grotesk', Inter, sans-serif" font-size="22" font-weight="700" letter-spacing="1">VPR</text>
    <text x="0" y="26" text-anchor="middle" fill="currentColor" opacity="0.55"
          font-family="Inter, sans-serif" font-size="11">Cosmos SDK chain</text>
  </g>

  <!-- ============ SATELLITES (6) ============ -->
  <g fill="currentColor" font-family="'Space Grotesk', Inter, sans-serif" font-size="16" font-weight="600">

    <!-- Frontend (top) -->
    <g transform="translate(800 200)">
      <rect x="-90" y="-30" width="180" height="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" rx="0"/>
      <text x="0" y="-3" text-anchor="middle">Frontend</text>
      <text x="0" y="16" text-anchor="middle" opacity="0.55" font-weight="400" font-size="11" font-family="Inter, sans-serif">ecosystem UI</text>
    </g>

    <!-- Resolver (top-right) -->
    <g transform="translate(1230 290)">
      <rect x="-90" y="-30" width="180" height="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" rx="0"/>
      <text x="0" y="-3" text-anchor="middle">Resolver</text>
      <text x="0" y="16" text-anchor="middle" opacity="0.55" font-weight="400" font-size="11" font-family="Inter, sans-serif">trust-chain lookups</text>
    </g>

    <!-- Indexer (bottom-right) -->
    <g transform="translate(1230 650)">
      <rect x="-90" y="-30" width="180" height="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" rx="0"/>
      <text x="0" y="-3" text-anchor="middle">Indexer</text>
      <text x="0" y="16" text-anchor="middle" opacity="0.55" font-weight="400" font-size="11" font-family="Inter, sans-serif">on-chain queries</text>
    </g>

    <!-- Visualizer (bottom) -->
    <g transform="translate(800 740)">
      <rect x="-90" y="-30" width="180" height="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" rx="0"/>
      <text x="0" y="-3" text-anchor="middle">Visualizer</text>
      <text x="0" y="16" text-anchor="middle" opacity="0.55" font-weight="400" font-size="11" font-family="Inter, sans-serif">registry dashboard</text>
    </g>

    <!-- Faucet (bottom-left) -->
    <g transform="translate(370 650)">
      <rect x="-90" y="-30" width="180" height="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" rx="0"/>
      <text x="0" y="-3" text-anchor="middle">Faucet</text>
      <text x="0" y="16" text-anchor="middle" opacity="0.55" font-weight="400" font-size="11" font-family="Inter, sans-serif">testnet tokens</text>
    </g>

    <!-- Explorer (top-left) -->
    <g transform="translate(370 290)">
      <rect x="-90" y="-30" width="180" height="60" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5" rx="0"/>
      <text x="0" y="-3" text-anchor="middle">Explorer</text>
      <text x="0" y="16" text-anchor="middle" opacity="0.55" font-weight="400" font-size="11" font-family="Inter, sans-serif">chain browser</text>
    </g>

  </g>

  <!-- Caption at bottom-right (co-maintainer note) -->
  <text x="1540" y="860" text-anchor="end" fill="currentColor" opacity="0.4"
        font-family="Inter, sans-serif" font-size="12" font-style="italic">Co-maintained with the Verana Foundation.</text>
</svg>
