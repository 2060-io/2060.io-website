<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="s15-t s15-d" preserveAspectRatio="xMidYMid meet">
  <title id="s15-t">Verana Foundation — artifact constellation</title>
  <desc id="s15-d">Central Verana mark in brand purple #763EF0, surrounded by a small constellation of the Foundation's public artifacts: specifications, GitHub orgs, testnet endpoints, explorer, council badge. Each labelled and connected by a thin hairline. 2060's own presence is quiet secondary text. 16:9.</desc>

  <!-- Title -->
  <text x="800" y="90" text-anchor="middle" fill="currentColor" opacity="0.55"
        font-family="'Space Grotesk', Inter, sans-serif" font-size="14" font-weight="500"
        letter-spacing="2" style="text-transform:uppercase">Verana Foundation</text>

  <!-- Connector spokes (hairline) from center to each artifact -->
  <g stroke="currentColor" stroke-width="1" opacity="0.2" fill="none">
    <line x1="800" y1="480" x2="320" y2="260"/>   <!-- Spec 1 -->
    <line x1="800" y1="480" x2="1280" y2="260"/>  <!-- Spec 2 -->
    <line x1="800" y1="480" x2="240" y2="480"/>   <!-- GitHub -->
    <line x1="800" y1="480" x2="1360" y2="480"/>  <!-- Testnet -->
    <line x1="800" y1="480" x2="400" y2="740"/>   <!-- Council -->
    <line x1="800" y1="480" x2="1200" y2="740"/>  <!-- Grantor -->
    <line x1="800" y1="480" x2="800" y2="200"/>   <!-- Explorer (top) -->
  </g>

  <!-- Central Verana mark -->
  <g transform="translate(800 480)">
    <circle cx="0" cy="0" r="70" fill="#763EF0"/>
    <text x="0" y="18" text-anchor="middle" fill="#ffffff"
          font-family="'Space Grotesk', Inter, sans-serif" font-size="56" font-weight="700" letter-spacing="-2">V</text>
  </g>
  <!-- Wordmark below the mark -->
  <text x="800" y="605" text-anchor="middle" fill="#763EF0"
        font-family="'Space Grotesk', Inter, sans-serif" font-size="32" font-weight="700" letter-spacing="-1">verana</text>

  <!-- ============ ARTIFACTS (7) ============ -->
  <g fill="currentColor" font-family="Inter, sans-serif" font-size="14">

    <!-- Spec 1: Verifiable Trust Spec (top-left) -->
    <g transform="translate(320 260)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="14" y="-6" font-weight="600">Verifiable Trust Spec</text>
      <text x="14" y="12" opacity="0.55" font-size="12">v4 · verana-labs.github.io</text>
    </g>

    <!-- Spec 2: VPR Spec (top-right) -->
    <g transform="translate(1280 260)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="-14" y="-6" text-anchor="end" font-weight="600">VPR Spec</text>
      <text x="-14" y="12" text-anchor="end" opacity="0.55" font-size="12">v4 · verana-labs.github.io</text>
    </g>

    <!-- Explorer (top center) -->
    <g transform="translate(800 200)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="0" y="-14" text-anchor="middle" font-weight="600">Chain Explorer</text>
      <text x="0" y="22" text-anchor="middle" opacity="0.55" font-size="12">testnet.verana.network</text>
    </g>

    <!-- GitHub (left) -->
    <g transform="translate(240 480)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="-14" y="-6" text-anchor="end" font-weight="600">GitHub</text>
      <text x="-14" y="12" text-anchor="end" opacity="0.55" font-size="12">github.com/verana-labs</text>
    </g>

    <!-- Testnet validator (right) -->
    <g transform="translate(1360 480)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="14" y="-6" font-weight="600">Validator</text>
      <text x="14" y="12" opacity="0.55" font-size="12">2060-operated · testnet live</text>
    </g>

    <!-- Council member (bottom-left) -->
    <g transform="translate(400 740)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="14" y="-6" font-weight="600">Council Member</text>
      <text x="14" y="12" opacity="0.55" font-size="12">2060 OÜ — founding member</text>
    </g>

    <!-- Grantor role (bottom-right) -->
    <g transform="translate(1200 740)">
      <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7"/>
      <text x="-14" y="-6" text-anchor="end" font-weight="600">Grantor role</text>
      <text x="-14" y="12" text-anchor="end" opacity="0.55" font-size="12">ecosystem-specific</text>
    </g>

  </g>

  <!-- 2060's quiet attribution (bottom center, muted) -->
  <text x="800" y="830" text-anchor="middle" fill="currentColor" opacity="0.4"
        font-family="Inter, sans-serif" font-size="12" font-style="italic">2060 is one of the engines behind the Foundation — not its headline.</text>
</svg>
